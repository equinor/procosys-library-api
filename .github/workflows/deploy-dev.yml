name: 🚀🔬 Deploy to Dev

on:
  pull_request:
  workflow_dispatch:

jobs:
  deploy:
    uses: ./.github/workflows/deploy.yml
    with:
      environment: dev
      radix-environment: dev
      branch: ${{ github.head_ref || github.ref_name }}
      commit-id: ${{ github.event.pull_request.head.sha || github.sha }}
    secrets: inherit
