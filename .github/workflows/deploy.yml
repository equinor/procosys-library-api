name: Deploy to Radix (Reusable)

on:
  workflow_call:
    inputs:
      environment:
        description: GitHub environment name (dev, test, prod)
        required: true
        type: string
      radix-environment:
        description: Radix environment name
        required: true
        type: string

jobs:
  build-and-push-image:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.change-id.outputs.change-id }}
    steps:
      - uses: actions/checkout@v4

      - name: Get change ID
        id: change-id
        uses: ./.github/actions/get-change-id

      - name: Setup .NET for Dockerfile build
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          auth-type: OIDC

      - name: Login to ACR
        env:
          ACR_REGISTRY: procosys.azurecr.io
        shell: bash
        run: |
          az acr login --name $(echo "${{ env.ACR_REGISTRY }}" | cut -d. -f1)

      - name: Build and push Docker image
        id: docker-build
        uses: ./.github/actions/docker-build-push-if-not-exists
        with:
          tag: ${{ steps.change-id.outputs.change-id }}

  deploy-to-radix:
    name: Deploy to Radix - ${{ inputs.radix-environment }}
    needs: build-and-push-image
    environment: ${{ inputs.environment }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          auth-type: OIDC

      - name: Deploy to Radix
        uses: equinor/radix-github-actions@v2
        with:
          azure_client_id: ${{ secrets.AZURE_CLIENT_ID }}

      - name: Deploy via Radix CLI
        shell: bash
        run: |
            rx create job deploy \
            --application procosys-library-api \
            --from-config \
            --environment ${{ inputs.radix-environment }} \
            --component backend \
            --image-tag-name backend=${{ needs.build-and-push-image.outputs.image-tag }} \
            --follow
