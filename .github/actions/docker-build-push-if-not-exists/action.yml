name: Builds and Pushes Docker Image if it Does Not Exist
description: Builds and pushes a Docker image to the Container Registry if it does not already exist.

inputs:
  tag:
    description: Docker image tag to check, build, and push
    required: true

outputs:
  image-built:
    description: Boolean indicating if image was built (true) or skipped (false)
    value: ${{ steps.build-status.outputs.image-built }}

runs:
  using: composite
  steps:
    - name: Check if image exists in ACR
      id: check-image
      uses: ./.github/actions/docker-check-if-image-exists
      with:
        tag: ${{ inputs.tag }}

    - name: Log check result
      shell: bash
      run: |
        if [ "${{ steps.check-image.outputs.image-exists }}" = "true" ]; then
          echo "Image procosys.azurecr.io/library/api:${{ inputs.tag }} already exists in ACR"
        else
          echo "Image does not exist; will build and push"
        fi

    - name: Build and push image
      if: steps.check-image.outputs.image-exists == 'false'
      uses: ./.github/actions/docker-build-push
      with:
        tag: ${{ inputs.tag }}

    - name: Set build status
      id: build-status
      shell: bash
      run: |
        if [ "${{ steps.check-image.outputs.image-exists }}" = "false" ]; then
          echo "image-built=true" >> $GITHUB_OUTPUT
        else
          echo "image-built=false" >> $GITHUB_OUTPUT
        fi
