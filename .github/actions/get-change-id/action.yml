name: 🔖 Get Change ID
description: Extract Git SHA short hash (7 chars) for image tagging

outputs:
  change-id:
    description: Git commit SHA short hash (7 chars)
    value: ${{ steps.change-id.outputs.change-id }}

runs:
  using: composite
  steps:
    - id: change-id
      shell: bash
      run: |
        CHANGE_ID=$(echo ${{ github.sha }} | cut -c1-7)
        echo "change-id=$CHANGE_ID" >> $GITHUB_OUTPUT
